server:
  port: 8848
  tomcat:
    max-swallow-size: 100MB
    max-http-form-post-size: 200MB

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 2KB
      resolve-lazily: false

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/omniflow?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379

search:
  engine: mysql

minio:
  endpoint: http://localhost:9000
  accessKey: admin
  secretKey: admin123
  defaultBucket: my-bucket

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted_at
      logic-delete-value: NOW()
      logic-not-delete-value: NULL
  # 开启日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl