server:
  port: 8848
  tomcat:
    max-swallow-size: ${OMNIFLOW_MAX_SWALLOW_SIZE:1200MB}
    max-http-form-post-size: ${OMNIFLOW_MAX_HTTP_FORM_POST_SIZE:1200MB}

spring:
  servlet:
    multipart:
      max-file-size: ${OMNIFLOW_MAX_FILE_SIZE:1024MB}
      max-request-size: ${OMNIFLOW_MAX_REQUEST_SIZE:1200MB}
      file-size-threshold: 2KB
      resolve-lazily: false
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/omniflow?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379

omniflow:
  upload:
    content-length-limit-bytes: ${OMNIFLOW_CONTENT_LENGTH_LIMIT_BYTES:1258291200}
  recycle-bin:
    retention-days: ${OMNIFLOW_RECYCLE_BIN_RETENTION_DAYS:30}
    cleanup-cron: "${OMNIFLOW_RECYCLE_BIN_CLEANUP_CRON:0 30 4 * * ?}"

search:
  engine: mysql

minio:
  endpoint: http://localhost:9000
  accessKey: admin
  secretKey: admin123
  defaultBucket: my-bucket

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted_at
      logic-delete-value: NOW()
      logic-not-delete-value: NULL
  # 开启日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
